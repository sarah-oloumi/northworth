<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }}</title>
    <style>
      :root {
        color: #1d252c;
        background: #f8f7f4;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      .icon-sprite {
        display: none;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 240px 1fr;
      }

      .sidebar {
        background: #ffffff;
        border-right: 1px solid #dedbd4;
        padding: 24px 18px;
      }

      .brand {
        margin: 0 0 28px;
        font-size: 24px;
        font-weight: 750;
      }

      .brand::before {
        content: "";
        display: inline-block;
        width: 10px;
        height: 18px;
        margin-right: 10px;
        border-radius: 2px;
        background: #c1121f;
        vertical-align: -2px;
      }

      .tabs {
        display: grid;
        gap: 6px;
      }

      .tab {
        display: grid;
        grid-template-columns: 20px 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 40px;
        padding: 0 10px;
        border-radius: 6px;
        color: #35424e;
        text-decoration: none;
      }

      .tab:first-child {
        background: #fff0f1;
        color: #8f0d17;
      }

      .tab-icon {
        width: 18px;
        height: 18px;
        color: currentColor;
        stroke-width: 1.9;
      }

      .tab-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status {
        color: #6f7d8a;
        font-size: 12px;
      }

      main {
        padding: 32px;
      }

      .panel {
        max-width: 960px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }

      p {
        max-width: 680px;
        color: #53616f;
        line-height: 1.6;
      }

      @media (max-width: 760px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid #dedbd4;
        }

        .tabs {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-layout-dashboard" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="8" rx="1.5" fill="none" stroke="currentColor"/>
        <rect x="14" y="3" width="7" height="5" rx="1.5" fill="none" stroke="currentColor"/>
        <rect x="14" y="12" width="7" height="9" rx="1.5" fill="none" stroke="currentColor"/>
        <rect x="3" y="15" width="7" height="6" rx="1.5" fill="none" stroke="currentColor"/>
      </symbol>
      <symbol id="icon-wallet" viewBox="0 0 24 24">
        <path d="M4 7.5h14.5A2.5 2.5 0 0 1 21 10v7.5A2.5 2.5 0 0 1 18.5 20h-13A2.5 2.5 0 0 1 3 17.5v-11A2.5 2.5 0 0 1 5.5 4H17" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16 13h5" fill="none" stroke="currentColor" stroke-linecap="round"/>
        <circle cx="16" cy="13" r="1" fill="currentColor"/>
      </symbol>
      <symbol id="icon-chart" viewBox="0 0 24 24">
        <path d="M4 19V5" fill="none" stroke="currentColor" stroke-linecap="round"/>
        <path d="M4 19h16" fill="none" stroke="currentColor" stroke-linecap="round"/>
        <path d="M7 15l3-4 3 2 5-7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-compass" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor"/>
        <path d="M15.5 8.5l-2.2 5-4.8 2 2.2-5 4.8-2z" fill="none" stroke="currentColor" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-home" viewBox="0 0 24 24">
        <path d="M4 11.5L12 5l8 6.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.5 10.5V20h11v-9.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 20v-5h4v5" fill="none" stroke="currentColor" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-calculator" viewBox="0 0 24 24">
        <rect x="5" y="3" width="14" height="18" rx="2" fill="none" stroke="currentColor"/>
        <path d="M8 7h8" fill="none" stroke="currentColor" stroke-linecap="round"/>
        <path d="M8 11h.01M12 11h.01M16 11h.01M8 15h.01M12 15h.01M16 15h.01" fill="none" stroke="currentColor" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-book-open" viewBox="0 0 24 24">
        <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H11v16H6.5A2.5 2.5 0 0 0 4 21V5.5z" fill="none" stroke="currentColor" stroke-linejoin="round"/>
        <path d="M20 5.5A2.5 2.5 0 0 0 17.5 3H13v16h4.5A2.5 2.5 0 0 1 20 21V5.5z" fill="none" stroke="currentColor" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor"/>
        <path d="M12 3.5v2M12 18.5v2M5.98 5.98l1.42 1.42M16.6 16.6l1.42 1.42M3.5 12h2M18.5 12h2M5.98 18.02l1.42-1.42M16.6 7.4l1.42-1.42" fill="none" stroke="currentColor" stroke-linecap="round"/>
      </symbol>
    </svg>
    <div class="app">
      <aside class="sidebar">
        <p class="brand">Northworth</p>
        <nav class="tabs" aria-label="Primary">
          {{ range .Tabs }}
            <a class="tab" href="#">
              <svg class="tab-icon" aria-hidden="true">
                <use href="#icon-{{ .Icon }}"></use>
              </svg>
              <span class="tab-label">{{ .Name }}</span>
              <span class="status">{{ .Status }}</span>
            </a>
          {{ end }}
        </nav>
      </aside>
      <main>
        <section class="panel">
          <h1>Local-first household wealth planning</h1>
          <p>
            Northworth will help model cash flow, taxes, property, investments, and strategy
            without sending private household data to a hosted service.
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
